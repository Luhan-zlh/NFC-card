<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>给凯玟的卡片</title>
<link rel="stylesheet" href="css/style.css">

<!-- PWA：支持"添加到主屏幕" -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#120826">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="我们的卡片">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
</head>
<body>

<canvas id="starfield"></canvas>

<!-- 进入遮罩：碰一下卡片打开网页后，先看到这个 -->
<div id="enter-overlay">
  <div class="heart-beat">♥</div>
  <button id="enter-btn">轻触，打开这张卡片</button>
  <div class="overlay-hint">— 只属于你 —</div>
</div>

<main>

  <!-- 开场 -->
  <section class="hero">
    <div class="subtitle">TO</div>
    <div class="her-name serif" id="her-name">凯玟</div>
    <div class="greeting" id="greeting-text">这是只属于你的卡片</div>
  </section>

  <div class="divider"></div>

  <!-- 在一起天数计数器 -->
  <section class="counter-section">
    <div class="counter-label">我们已经在一起</div>
    <div id="counter-value"></div>
  </section>

  <!-- 下一个重要日子倒计时（没有即将到来的会自动隐藏这个板块） -->
  <section class="milestone-section" id="milestone-section">
    <div class="milestone-chip">
      <span class="milestone-dot"></span>
      <span id="milestone-countdown"></span>
    </div>
  </section>

  <div class="divider"></div>

  <!-- 时间线 / 回忆录 -->
  <section class="timeline-section">
    <div class="section-title serif">我们的故事</div>
    <div class="section-subtitle">— 一些值得记住的日子 —</div>
    <ul id="timeline-list"></ul>
  </section>

  <div class="divider"></div>

  <!-- 爱意小纸条 -->
  <section class="note-section">
    <div class="section-title serif">今天想对你说</div>
    <div class="note-card">
      <div id="love-note-text"></div>
      <button id="shuffle-note-btn">换一条 ↻</button>
    </div>
  </section>

  <div class="divider"></div>

  <!-- 共享留言本 -->
  <section class="notebook-section">
    <div class="section-title serif">我们的留言本</div>
    <div class="section-subtitle">想到什么都可以随时写进去，两个人都可以</div>
    <a id="notebook-btn" href="javascript:void(0)" target="_blank" rel="noopener">留言本即将上线 …</a>
  </section>

  <footer>made with ♥ · 2026</footer>

</main>

<!-- 访问计数（不记录任何个人信息，只是一个数字） -->
<img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=kaiwen-nfc-card-2026-private&count_bg=%23120826&title_bg=%23120826&title=&edge_flat=false"
     style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"
     alt="" loading="eager">

<script src="js/data.js"></script>
<script src="js/script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
